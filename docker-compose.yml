version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres-ecommerce
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - ecommerce-network

  redis:
    image: redis:7-alpine
    container_name: redis-ecommerce
    ports:
      - "6379:6379"
    networks:
      - ecommerce-network

  keycloak:
    image: quay.io/keycloak/keycloak:22.0.1
    container_name: keycloak-auth-server
    environment:
      KC_DB: dev-file
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: true
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
    command: start-dev
    ports:
      - "8081:8080"
    networks:
      - ecommerce-network

  app:
    build: .
    container_name: ecommerce-app
    depends_on:
      - db
      - redis
      - keycloak
    ports:
      - "8080:8080"
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://db:5432/ecommerce_db
      SPRING_R2DBC_USERNAME: myuser
      SPRING_R2DBC_PASSWORD: mypassword
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ecommerce_db
      SPRING_DATASOURCE_USERNAME: myuser
      SPRING_DATASOURCE_PASSWORD: mypassword
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: security
    networks:
      - ecommerce-network

  payment-service:
    build: .
    container_name: payment-service
    depends_on:
      - db
      - redis
      - keycloak
    ports:
      - "8082:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_R2DBC_URL: r2dbc:postgresql://db:5432/ecommerce_db
      SPRING_R2DBC_USERNAME: myuser
      SPRING_R2DBC_PASSWORD: mypassword
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ecommerce_db
      SPRING_DATASOURCE_USERNAME: myuser
      SPRING_DATASOURCE_PASSWORD: mypassword
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: security
      SPRING_APPLICATION_NAME: payment-service
    networks:
      - ecommerce-network

volumes:
  postgres_data:

networks:
  ecommerce-network:
    driver: bridge