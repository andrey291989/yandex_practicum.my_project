spring:
  # Настройки для Testcontainers будут применяться через @DynamicPropertySource в тестах
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/testdb
    username: test
    password: test
  datasource:
    url: jdbc:postgresql://localhost:5432/testdb
    username: test
    password: test
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.example.ecommerce: DEBUG
    org.springframework.r2dbc: DEBUG
    org.flywaydb: DEBUG