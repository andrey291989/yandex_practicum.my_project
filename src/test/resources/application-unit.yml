# Конфигурация для unit-тестов (без реальных зависимостей)
spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  r2dbc:
    url: r2dbc:h2:mem:///testdb
    username: sa
    password:
  flyway:
    enabled: false
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms

logging:
  level:
    com.example.ecommerce: WARN