# Конфигурация для репозиторных тестов с Testcontainers
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/testdb
    username: test
    password: test
    driver-class-name: org.postgresql.Driver
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/testdb
    username: test
    password: test
  flyway:
    enabled: true
    locations: classpath:db/migration
  sql:
    init:
      mode: always

logging:
  level:
    com.example.ecommerce: DEBUG
    org.springframework.r2dbc: DEBUG
    org.flywaydb: DEBUG
    org.testcontainers: INFO