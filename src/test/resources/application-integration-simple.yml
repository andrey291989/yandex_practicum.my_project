# Упрощенная конфигурация для интеграционных тестов (без контейнеров)
spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  r2dbc:
    url: r2dbc:h2:mem:///testdb
    username: sa
    password:
  flyway:
    enabled: false
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 4
        min-idle: 1

logging:
  level:
    com.example.ecommerce: DEBUG
    org.springframework.r2dbc: DEBUG
    org.springframework.data.redis: WARN