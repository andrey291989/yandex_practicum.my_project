spring:
  application:
    name: ecommerce-showcase-reactive

  # R2DBC
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/${POSTGRES_DB:ecommerce_db}
    username: ${POSTGRES_USER:myuser}
    password: ${POSTGRES_PASSWORD:mypassword}

  # JDBC DataSource для Flyway
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:ecommerce_db}
    username: ${POSTGRES_USER:myuser}
    password: ${POSTGRES_PASSWORD:mypassword}
    driver-class-name: org.postgresql.Driver

  # Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Thymeleaf
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

server:
  port: 8080

logging:
  level:
    com.example.ecommerce: DEBUG

  # Redis
  redis:
    host: redis
    port: 6379
    timeout: 2000ms