spring:
  application:
    name: ecommerce-showcase-reactive

  # R2DBC
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/ecommerce_db
    username: myuser
    password: mypassword

  # JDBC DataSource для Flyway
  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce_db
    username: myuser
    password: mypassword
    driver-class-name: org.postgresql.Driver

  # Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Thymeleaf
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

server:
  port: 8080

logging:
  level:
    com.example.ecommerce: DEBUG