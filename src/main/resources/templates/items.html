<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Витрина магазина - Reactive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .card-img-top {
            height: 200px;
            object-fit: contain;
            background-color: #f8f9fa;
            padding: 10px;
        }
        .placeholder-card {
            background: #f8f9fa;
            border: 2px dashed #dee2e6;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .placeholder-text {
            color: #adb5bd;
            font-size: 1.2rem;
        }
        .item-count {
            min-width: 40px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .stock-badge {
            font-size: 0.8rem;
            padding: 3px 8px;
        }
        .card {
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .reactive-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #6f42c1;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 1000;
        }
    </style>
</head>

<body class="bg-light">

<div class="reactive-badge">
    <i class="bi bi-lightning-charge"></i> Reactive
</div>

<form id="main" method="get" th:action="@{/items}">
    <input type="hidden" name="search" th:value="${search}">
    <input type="hidden" name="sort" th:value="${sort}">
    <input type="hidden" name="pageSize" th:value="${paging.pageSize}">
</form>

<div class="container p-2">
    <!-- Header -->
    <div class="row p-2">
        <div class="col">
            <div class="hstack gap-3">
                <h2>
                    <span class="badge text-bg-success">Витрина магазина (Reactive)</span>
                </h2>
                <a href="/orders" class="btn btn-secondary ms-auto bi bi-file-earmark-text"> Заказы</a>
                <a href="/cart/items" class="btn btn-secondary bi bi-cart4"> Корзина</a>
            </div>
        </div>
    </div>

    <!-- Search and filters -->
    <div class="row p-2">
        <div class="col">
            <div class="hstack gap-3">
                <input class="form-control me-2 mw-100" type="search" placeholder="Найти..." aria-label="Поиск"
                       name="search" th:value="${search}" form="main"/>
                <button class="btn btn-outline-success" type="submit" form="main">Найти</button>

                <div class="form-floating w-25">
                    <select class="form-select" id="sort" name="sort" onchange="document.getElementById('main').submit()" form="main">
                        <option value="NO" th:selected="${sort=='NO'}">нет</option>
                        <option value="ALPHA" th:selected="${sort=='ALPHA'}">по алфавиту</option>
                        <option value="PRICE" th:selected="${sort=='PRICE'}">по цене</option>
                    </select>
                    <label for="sort">Сортировка</label>
                </div>

                <div class="form-floating w-25">
                    <select class="form-select" id="pageSize" name="pageSize" onchange="document.getElementById('main').submit()" form="main">
                        <option value="2" th:selected="${paging.pageSize==2}">2</option>
                        <option value="5" th:selected="${paging.pageSize==5}">5</option>
                        <option value="10" th:selected="${paging.pageSize==10}">10</option>
                        <option value="20" th:selected="${paging.pageSize==20}">20</option>
                        <option value="50" th:selected="${paging.pageSize==50}">50</option>
                        <option value="100" th:selected="${paging.pageSize==100}">100</option>
                    </select>
                    <label for="pageSize">На странице</label>
                </div>
            </div>
        </div>
    </div>

    <!-- Items grid -->
    <div th:if="${not #lists.isEmpty(items)}">
        <div th:with="rowCount=${(items.size() + 2) / 3}">
            <div th:each="row, rowStat : ${#numbers.sequence(0, rowCount - 1)}" class="row p-2">
                <div th:each="col : ${#numbers.sequence(0, 2)}" class="col-md-4 mb-4">
                    <div th:with="itemIndex=${row * 3 + col}">
                        <div th:if="${itemIndex < items.size()}">
                            <div th:with="item=${items[itemIndex]}" class="card h-100">
                                <a th:href="@{/items/{id}(id=${item.id})}">
                                    <img th:src="@{'/images/' + ${item.imgPath}}" class="card-img-top" alt="Нет изображения"
                                         onerror="this.src='/images/placeholder.jpg'">
                                </a>
                                <div class="card-body d-flex flex-column">
                                    <h5 class="card-title" th:text="${item.title}"></h5>
                                    <h5>
                                        <span class="badge text-bg-success" th:text="${item.price} + ' руб.'"></span>
                                    </h5>
                                    <p class="card-text flex-grow-1" th:text="${item.description}"></p>

                                    <div class="mb-2">
                                        <span class="badge bg-secondary stock-badge" th:if="${item.stockCount > 0}">
                                            <i class="bi bi-box"></i> В наличии: <span th:text="${item.stockCount}"></span> шт.
                                        </span>
                                        <span class="badge bg-danger stock-badge" th:if="${item.stockCount == 0}">
                                            <i class="bi bi-x-circle"></i> Нет в наличии
                                        </span>
                                    </div>

                                    <form method="post" th:action="@{/cart/items/add}" class="mt-3">
                                        <input type="hidden" name="id" th:value="${item.id}">
                                        <input type="hidden" name="search" th:value="${search}">
                                        <input type="hidden" name="sort" th:value="${sort}">
                                        <input type="hidden" name="pageSize" th:value="${paging.pageSize}">
                                        <input type="hidden" name="pageNumber" th:value="${paging.pageNumber}">

                                        <div class="hstack gap-2 justify-content-center">
                                            <button type="submit" class="btn btn-outline-secondary" name="action" value="MINUS"
                                                    th:disabled="${item.stockCount == 0}">-</button>
                                            <span class="item-count" th:text="${item.cartCount}"></span>
                                            <button type="submit" class="btn btn-outline-secondary" name="action" value="PLUS"
                                                    th:disabled="${item.stockCount == 0}">+</button>
                                            <button type="submit" class="btn btn-warning ms-auto bi bi-cart4"
                                                    name="action" value="PLUS" th:if="${item.cartCount == 0 and item.stockCount > 0}"></button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                        <div th:if="${itemIndex >= items.size()}" class="placeholder-card h-100">
                            <div class="placeholder-text">
                                <i class="bi bi-emoji-neutral" style="font-size: 3rem;"></i>
                                <p class="mt-2">Скоро появится</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <div class="row p-2" th:if="${not #lists.isEmpty(items)}">
        <div class="col">
            <div class="hstack gap-3 justify-content-center">
                <button type="submit" class="btn btn-light" th:if="${paging.hasPrevious}"
                        name="pageNumber" th:value="${paging.pageNumber - 1}" form="main">
                    <i class="bi bi-arrow-left"></i> Назад
                </button>
                <span class="badge bg-secondary" th:text="'Страница ' + ${paging.pageNumber} + ' из ' + ${paging.totalPages}"></span>
                <button type="submit" class="btn btn-light" th:if="${paging.hasNext}"
                        name="pageNumber" th:value="${paging.pageNumber + 1}" form="main">
                    Вперед <i class="bi bi-arrow-right"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- No items message -->
    <div class="row p-2" th:if="${items == null or items.isEmpty()}">
        <div class="col text-center">
            <div class="alert alert-info">
                <i class="bi bi-info-circle"></i> Товары не найдены
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
</body>
</html>
