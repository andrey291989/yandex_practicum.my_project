<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Корзина - Витрина магазина</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .cart-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            background-color: #f8f9fa;
            padding: 5px;
        }
        .quantity-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .quantity-number {
            min-width: 40px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .total-price {
            font-size: 1.2rem;
            font-weight: bold;
            color: #28a745;
        }
        .card {
            transition: transform 0.2s;
            margin-bottom: 15px;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body class="bg-light">
<div class="container p-2">
    <!-- Header -->
    <div class="row p-2">
        <div class="col">
            <div class="hstack gap-3">
                <h2>
                    <span class="badge text-bg-success">Корзина</span>
                </h2>
                <a href="/orders" class="btn btn-secondary ms-auto bi bi-file-earmark-text"> Заказы</a>
                <a href="/items" class="btn btn-secondary bi bi-arrow-left-square"> Главная</a>
            </div>
        </div>
    </div>

    <!-- Success/Error messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Cart items -->
    <div class="row p-2" th:each="item : ${items}">
        <div class="col">
            <div class="card">
                <div class="row g-0 align-items-center">
                    <div class="col-md-2 text-center">
                        <img class="cart-img m-2" th:src="@{'/images/' + ${item.imgPath}}" alt="Нет изображения"
                             onerror="this.src='/images/placeholder.jpg'">
                    </div>
                    <div class="col-md-6">
                        <div class="card-body">
                            <h5 class="card-title" th:text="${item.title}"></h5>
                            <p class="card-text text-muted small" th:text="${item.description}"></p>
                            <span class="badge bg-success" th:text="${item.price} + ' руб.'"></span>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card-body">
                            <form th:action="@{/cart/items}" method="post" class="quantity-control">
                                <input type="hidden" name="id" th:value="${item.id}">
                                <input type="hidden" name="from" value="cart">
                                <button type="submit" class="btn btn-outline-secondary btn-sm" name="action" value="MINUS">-</button>
                                <span class="quantity-number" th:text="${item.cartCount}"></span>
                                <button type="submit" class="btn btn-outline-secondary btn-sm" name="action" value="PLUS">+</button>
                                <button type="submit" class="btn btn-danger btn-sm ms-auto bi bi-trash"
                                        name="action" value="DELETE"></button>
                            </form>
                            <div class="mt-2 text-end">
                                <strong>Сумма:</strong>
                                <span class="total-price" th:text="${item.price * item.cartCount} + ' руб.'"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty cart message -->
    <div class="row p-2" th:if="${items.isEmpty()}">
        <div class="col text-center">
            <div class="alert alert-info">
                <i class="bi bi-cart4 fs-1"></i>
                <h4>Ваша корзина пуста</h4>
                <p>Добавьте товары из каталога</p>
                <a href="/items" class="btn btn-primary">Перейти к покупкам</a>
            </div>
        </div>
    </div>

    <!-- Total and checkout -->
    <div class="row p-2" th:if="${not #lists.isEmpty(items)}">
        <div class="col">
            <div class="card bg-light">
                <div class="card-body">
                    <div class="row align-items-center">
                        <div class="col-md-8">
                            <h4>Итого к оплате:</h4>
                            <h2 class="text-success" th:text="${total} + ' руб.'"></h2>
                        </div>
                        <div class="col-md-4 text-end">
                            <form action="/buy" method="post">
                                <button type="submit" class="btn btn-success btn-lg">
                                    <i class="bi bi-check-circle"></i> Оформить заказ
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</body>

</html>
