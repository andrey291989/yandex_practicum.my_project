openapi: 3.0.3
info:
  title: Payment Service API
  description: RESTful API for processing payments in the e-commerce application
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Development server

paths:
  /api/payments:
    post:
      summary: Create a new payment
      description: Initiates a payment for an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
      responses:
        '201':
          description: Payment created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Insufficient funds or payment conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/payments/{paymentId}:
    get:
      summary: Get payment status
      description: Retrieves the current status of a payment
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Payment status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '404':
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    CreatePaymentRequest:
      type: object
      required:
        - orderId
        - amount
        - userId
      properties:
        orderId:
          type: integer
          format: int64
          description: ID of the order to be paid
        amount:
          type: integer
          format: int64
          description: Payment amount in minor units (e.g., cents)
        userId:
          type: integer
          format: int64
          description: ID of the user making the payment
        description:
          type: string
          description: Optional payment description

    PaymentResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the payment
        orderId:
          type: integer
          format: int64
          description: ID of the associated order
        userId:
          type: integer
          format: int64
          description: ID of the user who made the payment
        amount:
          type: integer
          format: int64
          description: Payment amount in minor units
        status:
          type: string
          enum: [PENDING, COMPLETED, FAILED, CANCELLED]
          description: Current status of the payment
        description:
          type: string
          description: Payment description
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the payment was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the payment was last updated

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message
        timestamp:
          type: string
          format: date-time
          description: When the error occurred
        status:
          type: integer
          description: HTTP status code