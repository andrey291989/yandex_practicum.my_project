<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Навигационная панель</title>
</head>
<body>
<div th:fragment="navbar">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Интернет-магазин</a>

            <div class="navbar-nav me-auto">
                <a class="nav-link" href="/items">Каталог</a>
                <a class="nav-link" href="/orders">Заказы</a>
                <a class="nav-link" href="/cart/items">Корзина</a>
            </div>

            <div class="navbar-nav ms-auto">
                <div sec:authorize="isAuthenticated()" class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"
                       data-bs-toggle="dropdown" aria-expanded="false">
                        <span sec:authentication="name">Пользователь</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/logout">Выйти</a></li>
                    </ul>
                </div>
                <div sec:authorize="!isAuthenticated()" class="nav-item">
                    <a class="nav-link" href="/login">Войти</a>
                </div>
            </div>
        </div>
    </nav>
</div>
</body>
</html>
